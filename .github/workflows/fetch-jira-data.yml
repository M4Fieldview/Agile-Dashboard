name: Refresh Jira Data

on:
  schedule:
    - cron: '*/5 * * * *'    # Every 5 minutes (GitHub's practical minimum)
  workflow_dispatch:           # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-jira-data.yml'
      - '.github/scripts/fetch_jira.py'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Jira data
        env:
          JIRA_URL:   ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python3 .github/scripts/fetch_jira.py

      - name: Commit and push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh Jira data [skip ci]"
          git push
